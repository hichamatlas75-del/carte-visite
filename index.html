<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grey Corner – Carte de Visite Digitale</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#030303', 800: '#050505', 700: '#0A0A0A', 600: '#111111', 500: '#1a1a1a' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #030303;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .bg-glow-top {
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(255,255,255,0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        .bg-glow-bottom {
            position: fixed;
            bottom: -150px;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(180,160,130,0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .card-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            perspective: 1200px;
        }

        .card-main {
            position: relative;
            background: linear-gradient(145deg, #0A0A0A 0%, #111111 50%, #0A0A0A 100%);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 25px 60px -12px rgba(0,0,0,0.7),
                0 0 80px -20px rgba(180,160,130,0.05);
            animation: cardEntry 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(40px) scale(0.96);
        }

        @keyframes cardEntry {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card-main::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 40%, transparent 60%, rgba(180,160,130,0.08) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: 1;
        }

        .card-pattern {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .logo-section {
            position: relative;
            z-index: 2;
            padding: 40px 32px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-wrapper {
            position: relative;
            margin-bottom: 8px;
        }

        .logo-wrapper::after {
            content: '';
            position: absolute;
            bottom: -14px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(180,160,130,0.3), transparent);
        }

        .logo-img {
            width: 140px;
            height: auto;
            filter: brightness(1.05) contrast(1.05);
            animation: logoReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
            opacity: 0;
        }

        @keyframes logoReveal {
            from { opacity: 0; transform: scale(0.8) rotateY(15deg); }
            to { opacity: 1; transform: scale(1) rotateY(0); }
        }

        .separator {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            position: relative;
            z-index: 2;
        }

        .info-section {
            position: relative;
            z-index: 2;
            padding: 28px 32px;
        }

        .business-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
            text-align: center;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 4px;
            animation: fadeUp 0.8s ease-out 0.5s forwards;
            opacity: 0;
        }

        .business-type {
            font-size: 0.7rem;
            font-weight: 500;
            color: rgba(255,255,255,0.35);
            text-align: center;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 20px;
            animation: fadeUp 0.8s ease-out 0.6s forwards;
            opacity: 0;
        }

        .gerant-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 100px;
            padding: 8px 20px;
            margin: 0 auto 24px;
            animation: fadeUp 0.8s ease-out 0.7s forwards;
            opacity: 0;
        }

        .gerant-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #C5A059;
            box-shadow: 0 0 8px rgba(197,160,89,0.4);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.85); }
        }

        .gerant-label {
            font-size: 0.65rem;
            font-weight: 500;
            color: rgba(255,255,255,0.3);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .gerant-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.06em;
        }

        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 16px;
            border-radius: 14px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            animation: fadeUp 0.8s ease-out forwards;
            opacity: 0;
        }

        .contact-item:nth-child(1) { animation-delay: 0.8s; }
        .contact-item:nth-child(2) { animation-delay: 0.9s; }
        .contact-item:nth-child(3) { animation-delay: 1.0s; }

        .contact-item:hover {
            background: rgba(255,255,255,0.03);
        }

        .contact-item:active {
            transform: scale(0.98);
        }

        .contact-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .contact-item:hover .contact-icon {
            background: rgba(197,160,89,0.08);
            border-color: rgba(197,160,89,0.15);
        }

        .contact-icon svg {
            width: 18px;
            height: 18px;
            color: rgba(255,255,255,0.4);
            transition: color 0.3s ease;
        }

        .contact-item:hover .contact-icon svg {
            color: #C5A059;
        }

        .contact-text-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .contact-label {
            font-size: 0.6rem;
            font-weight: 600;
            color: rgba(255,255,255,0.25);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .contact-value {
            font-size: 0.95rem;
            font-weight: 400;
            color: rgba(255,255,255,0.85);
            letter-spacing: 0.02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .contact-arrow {
            margin-left: auto;
            opacity: 0;
            transform: translateX(-8px);
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .contact-arrow svg {
            width: 16px;
            height: 16px;
            color: rgba(197,160,89,0.6);
        }

        .contact-item:hover .contact-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        .card-footer {
            position: relative;
            z-index: 2;
            padding: 16px 32px 28px;
            display: flex;
            justify-content: center;
        }

        .save-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 28px;
            border-radius: 100px;
            background: #fff;
            color: #000;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: fadeUp 0.8s ease-out 1.1s forwards;
            opacity: 0;
            box-shadow: 0 0 20px -5px rgba(255,255,255,0.15);
        }

        .save-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px -5px rgba(255,255,255,0.25);
        }

        .save-btn:active {
            transform: scale(0.97);
        }

        .save-btn svg {
            width: 16px;
            height: 16px;
        }

        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1a1a1a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease;
            opacity: 0;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-icon {
            width: 20px;
            height: 20px;
            color: #C5A059;
        }

        .toast-text {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.8);
            font-weight: 500;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .corner-deco {
            position: absolute;
            width: 24px;
            height: 24px;
            z-index: 2;
            opacity: 0.15;
        }
        .corner-deco.tl { top: 16px; left: 16px; border-top: 1px solid #fff; border-left: 1px solid #fff; }
        .corner-deco.tr { top: 16px; right: 16px; border-top: 1px solid #fff; border-right: 1px solid #fff; }
        .corner-deco.bl { bottom: 16px; left: 16px; border-bottom: 1px solid #fff; border-left: 1px solid #fff; }
        .corner-deco.br { bottom: 16px; right: 16px; border-bottom: 1px solid #fff; border-right: 1px solid #fff; }

        @media (max-width: 480px) {
            .card-main { border-radius: 20px; }
            .logo-section { padding: 32px 24px 20px; }
            .info-section { padding: 24px; }
            .card-footer { padding: 12px 24px 24px; }
            .logo-img { width: 120px; }
            .business-name { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="bg-glow-top"></div>
    <div class="bg-glow-bottom"></div>

    <div class="card-container">
        <div class="card-main" id="cardMain">
            <div class="corner-deco tl"></div>
            <div class="corner-deco tr"></div>
            <div class="corner-deco bl"></div>
            <div class="corner-deco br"></div>
            <div class="card-pattern"></div>

            <div class="logo-section">
                <div class="logo-wrapper">
                    <img src="logo.png" alt="Grey Corner Café" class="logo-img">
                </div>
            </div>

            <div class="separator"></div>

            <div class="info-section">
                <div class="business-name">Grey Corner</div>
                <div class="business-type">Café & Restaurant</div>

                <div style="display:flex;justify-content:center;">
                    <div class="gerant-badge">
                        <div class="gerant-dot"></div>
                        <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
                            <span class="gerant-label">Gérant</span>
                            <span class="gerant-name">Quassir Hicham</span>
                        </div>
                    </div>
                </div>

                <div class="contact-list">
                    <a href="tel:0535940168" class="contact-item">
                        <div class="contact-icon">
                            <i data-lucide="phone"></i>
                        </div>
                        <div class="contact-text-group">
                            <span class="contact-label">Téléphone</span>
                            <span class="contact-value">05 35 94 01 68</span>
                        </div>
                        <div class="contact-arrow">
                            <i data-lucide="arrow-up-right"></i>
                        </div>
                    </a>

                    <a href="tel:0666265160" class="contact-item">
                        <div class="contact-icon">
                            <i data-lucide="smartphone"></i>
                        </div>
                        <div class="contact-text-group">
                            <span class="contact-label">Portable</span>
                            <span class="contact-value">06 66 26 51 60</span>
                        </div>
                        <div class="contact-arrow">
                            <i data-lucide="arrow-up-right"></i>
                        </div>
                    </a>

                    <a href="https://greycorner.pages.dev/" target="_blank" rel="noopener" class="contact-item">
                        <div class="contact-icon">
                            <i data-lucide="globe"></i>
                        </div>
                        <div class="contact-text-group">
                            <span class="contact-label">Site Web</span>
                            <span class="contact-value">greycorner.pages.dev</span>
                        </div>
                        <div class="contact-arrow">
                            <i data-lucide="arrow-up-right"></i>
                        </div>
                    </a>
                </div>
            </div>

            <div class="card-footer">
                <button class="save-btn" id="saveBtn" onclick="saveContact()">
                    <i data-lucide="download"></i>
                    Enregistrer le contact
                </button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <i data-lucide="check-circle" class="toast-icon"></i>
        <span class="toast-text">Contact enregistré avec succès !</span>
    </div>

    <script>
        lucide.createIcons();

        const card = document.getElementById('cardMain');
        const container = document.querySelector('.card-container');

        container.addEventListener('mousemove', (e) => {
            if (window.innerWidth < 768) return;
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = ((y - centerY) / centerY) * -3;
            const rotateY = ((x - centerX) / centerX) * 3;
            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            card.style.transition = 'transform 0.1s ease-out';
        });

        container.addEventListener('mouseleave', () => {
            card.style.transform = 'rotateX(0) rotateY(0)';
            card.style.transition = 'transform 0.5s ease-out';
        });

        function saveContact() {
            const vcf = `BEGIN:VCARD
VERSION:3.0
N:Quassir;Hicham;;
FN:Quassir Hicham
ORG:Grey Corner Café & Restaurant
TITLE:Gérant
TEL;TYPE=WORK,VOICE:0535940168
TEL;TYPE=CELL:0666265160
URL:https://greycorner.pages.dev/
NOTE:Café & Restaurant - Grey Corner
END:VCARD`;

            const blob = new Blob([vcf], { type: 'text/vcard;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'Grey_Corner_Quassir_Hicham.vcf';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast();
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }
    </script>
</body>
</html>
